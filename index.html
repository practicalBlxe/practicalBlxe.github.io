<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Award Logging System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: white;
            padding: 1rem;
            width: 100%;
            text-align: center;
        }
        button {
            background-color: #333;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: none;
  color: white;
  padding: 15px 32px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
        }
        .container {
            margin-left: 20px;
            margin-right: 20px;
            padding: 20px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 600px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        .form-group button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .form-group button:hover {
            background-color: #0056b3;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        ul li {
            background: #f9f9f9;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        ul li img {
            width: 50px;
            height: auto;
            margin-right: 15px;
        }
        #loginContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #appContainer {
            display: none;
        }
        #suggestionBox {
            border: 1px solid #ddd;
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        #suggestionBox div {
            display: flex;
            align-items: center;
            padding: 5px;
            cursor: pointer;
        }
        #suggestionBox div img {
            width: 30px;
            height: auto;
            margin-right: 10px;
        }
        #suggestionBox div:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <header>
        <h1>US Award Logging System</h1>
    </header>
    <div id="loginContainer" class="container">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username...">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password...">
        </div>
        <button id="loginButton">Login</button>
        <p id="loginMessage" style="color: red; display: none;">Invalid username or password.</p>
    </div>
    <div id="appContainer" class="container">
        <div class="form-group">
            <label for="personName">Search Awards by Name</label>
            <input type="text" id="personName" placeholder="Enter person's name...">
        </div>
        <button id="searchButton">Search</button>
        <ul id="resultsList"></ul>
        <hr>
        <div id="logAwardContainer" style="display: none;">
            <div class="form-group">
                <label for="newPerson">Log New Award</label>
                <input type="text" id="newPerson" placeholder="Enter person's name...">
            </div>
            <div class="form-group">
                <input type="text" id="newAward" placeholder="Enter new award name...">
                <div id="suggestionBox">
                    <!-- Suggestions will be dynamically added here -->
                </div>
            </div>
            <div class="form-group">
                <input type="text" id="newDevice" placeholder="Enter devices (if applicable)...">
            </div>
            <button id="logButton">Log Award</button>
        </div>
    </div>

    <script>
        const awardImages = {
            "Medal of Honor": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Medal_of_Honor_ribbon.svg/1920px-Medal_of_Honor_ribbon.svg.png",
            "Distinguished Service Cross": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Distinguished_Service_Cross_ribbon.svg/1920px-Distinguished_Service_Cross_ribbon.svg.png",
            "defense distinguished service medal": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Defense_Distinguished_Service_Medal_ribbon.svg/120px-Defense_Distinguished_Service_Medal_ribbon.svg.png",
            "joint services commendation medal": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Joint_Service_Commendation_Medal_ribbon.svg/120px-Joint_Service_Commendation_Medal_ribbon.svg.png",
            "army commendation medal": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/Army_Commendation_Medal_ribbon.svg/120px-Army_Commendation_Medal_ribbon.svg.png",
            "joint services achievement medal": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Joint_Service_Achievement_Medal_ribbon.svg/120px-Joint_Service_Achievement_Medal_ribbon.svg.png",
            "army achievement medal": "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Army_Achievement_Medal_ribbon.svg/120px-Army_Achievement_Medal_ribbon.svg.png",
        };
        const tokenPrefix = "github_pat";
        const apiBaseUrl = "https://api.github.com/repos/practicalBlxe/practicalBlxe.github.io/contents/"; // Replace with your GitHub repo details
        const token = "11BNWOS2A0N1NPBhdWhHf8_LhN5jEEEqJUAiUhb2cPl5x8D9WS70IbK0NEMTQp3EomONF3D2IXKfWjFg2z"; // Replace with your fine-grained GitHub token
        const fullToken = tokenPrefix.concat("_",token)

        async function fetchFile(filePath) {
            const url = `${apiBaseUrl}${filePath}`;
            const response = await fetch(url, {
                headers: {
                    Authorization: `Bearer ${fullToken}`
                }
            });

            if (!response.ok) {
                console.error(`Failed to fetch ${filePath}. Status: ${response.status}, ${response.statusText}`);
                return null;
            }

            const fileData = await response.json();
            return { content: JSON.parse(atob(fileData.content)), sha: fileData.sha };
        }

        async function updateFile(filePath, content) {
            const fileDetails = await fetchFile(filePath);

            if (!fileDetails) {
                console.error(`Cannot update ${filePath}. Unable to fetch file details.`);
                return;
            }

            const { sha } = fileDetails;
            const url = `${apiBaseUrl}${filePath}`;
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    Authorization: `Bearer ${fullToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Update ${filePath}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(content)))),
                    sha
                })
            });

            if (!response.ok) {
                console.error(`Failed to update ${filePath}. Status: ${response.status}, ${response.statusText}`);
            }
        }

        let validUsers = {};
        let peopleAwards = {};

        async function initializeApp() {
            const usersData = await fetchFile('validUsers.json');
            validUsers = usersData ? usersData.content : {};

            const awardsData = await fetchFile('peopleAwards.json');
            peopleAwards = awardsData ? awardsData.content : {};
        }

        const loginContainer = document.getElementById('loginContainer');
        const appContainer = document.getElementById('appContainer');
        const logAwardContainer = document.getElementById('logAwardContainer');

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginButton = document.getElementById('loginButton');
        const loginMessage = document.getElementById('loginMessage');

        loginButton.addEventListener('click', () => {
            const username = usernameInput.value.trim().toLowerCase();
            const password = passwordInput.value.trim();

            if (validUsers[username] && validUsers[username] === password) {
                loginContainer.style.display = 'none';
                appContainer.style.display = 'block';

                if (username === 'admin') {
                    logAwardContainer.style.display = 'block';
                }
            } else {
                loginMessage.style.display = 'block';
            }
        });

        const searchButton = document.getElementById('searchButton');
        const personName = document.getElementById('personName');
        const resultsList = document.getElementById('resultsList');

        const logButton = document.getElementById('logButton');
        const newPerson = document.getElementById('newPerson');
        const newAward = document.getElementById('newAward');
        const newDevice = document.getElementById('newDevice');
        const suggestionBox = document.getElementById('suggestionBox');

        personName.addEventListener('input', () => {
            personName.value = personName.value.toLowerCase();
        });

        newPerson.addEventListener('input', () => {
            newPerson.value = newPerson.value.toLowerCase();
        });

        newAward.addEventListener('input', () => {
            const query = newAward.value.trim().toLowerCase();
            suggestionBox.innerHTML = '';
            if (!query) {
                suggestionBox.style.display = 'none';
                return;
            }

            const suggestions = Object.keys(awardImages).filter(award => award.includes(query));
            suggestions.forEach(award => {
                const suggestionDiv = document.createElement('div');
                const img = document.createElement('img');
                img.src = awardImages[award];
                img.alt = award;
                suggestionDiv.appendChild(img);
                suggestionDiv.appendChild(document.createTextNode(award));
                suggestionDiv.addEventListener('click', () => {
                    newAward.value = award;
                    suggestionBox.style.display = 'none';
                });
                suggestionBox.appendChild(suggestionDiv);
            });
            suggestionBox.style.display = suggestions.length ? 'block' : 'none';
        });

        searchButton.addEventListener('click', () => {
    const query = personName.value.trim().toLowerCase();
    resultsList.innerHTML = '';

    if (peopleAwards[query]) {
        peopleAwards[query].forEach(entry => {
            const li = document.createElement('li');
            const img = document.createElement('img');
            img.src = awardImages[entry.award.toLowerCase()] || 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Placeholder_award.svg/120px-Placeholder_award.svg.png';
            img.alt = entry.award;
            li.appendChild(img);

            // Ensure `entry.devices` is treated as an array
            const devicesList = Array.isArray(entry.devices) ? entry.devices : [];
            const text = document.createTextNode(`Award: ${entry.award}, Devices: ${devicesList.join(', ') || 'None'}`);
            li.appendChild(text);
            resultsList.appendChild(li);
        });
    } else {
        const li = document.createElement('li');
        li.textContent = 'No awards found for this person.';
        resultsList.appendChild(li);
    }
});


        logButton.addEventListener('click', async () => {
            const person = newPerson.value.trim().toLowerCase();
            const award = newAward.value.trim().toLowerCase();
            const devices = newDevice.value.split(',').map(device => device.trim()).filter(device => device);

            if (!person || !award) {
                alert('Please enter both a name and an award.');
                return;
            }

            if (!peopleAwards[person]) {
                peopleAwards[person] = [];
            }

            peopleAwards[person].push({ award, devices });

            await updateFile('peopleAwards.json', peopleAwards);

            alert('Award logged successfully.');
            newPerson.value = '';
            newAward.value = '';
            newDevice.value = '';
            suggestionBox.style.display = 'none';
        });

        initializeApp();
    </script>
</body>
</html>
